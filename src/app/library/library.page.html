<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-segment (ionChange)="segmentChanged($event)" value="playlists">
      <ion-segment-button value="playlists">
        <ion-label>Playlists</ion-label>
      </ion-segment-button>
      <ion-segment-button value="artists">
        <ion-label>Artists</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Playlists</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list *ngFor="let playlist of playlists">
    <ion-item>
      <ion-label>{{playlist.name}}</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
