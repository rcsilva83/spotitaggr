<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-segment [(ngModel)]="currentSegment">
      <ion-segment-button value="playlists">
        <ion-label>Playlists</ion-label>
      </ion-segment-button>
      <ion-segment-button value="artists">
        <ion-label>Artists</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div [ngSwitch]="currentSegment">
    <app-playlists *ngSwitchCase="'playlists'"></app-playlists>
    <app-artists *ngSwitchCase="'artists'"></app-artists>
  </div>
</ion-content>
